<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#111111"/>
  <rect x="1" y="1" width="398" height="498" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <!-- Bottle body -->
  <rect x="155" y="200" width="90" height="140" rx="4" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottle neck -->
  <rect x="175" y="170" width="50" height="34" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottle cap -->
  <rect x="170" y="155" width="60" height="18" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <!-- Label line -->
  <line x1="170" y1="250" x2="230" y2="250" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
  <!-- Shimmer lines -->
  <line x1="170" y1="260" x2="215" y2="260" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
  <line x1="170" y1="270" x2="220" y2="270" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
</svg>
